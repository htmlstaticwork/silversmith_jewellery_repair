<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Silver</title>
    <meta name="description" content="Premium silversmith specializing in custom silver jewelry design and expert jewelry repair services.">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
</head>
<body>

        <main>
        <section class="account-section">
            <div class="account-card reveal-up">
                <div class="account-card-actions">
                    <button class="rtl-toggle" aria-label="Toggle RTL Layout"><i data-lucide="languages"></i></button>
                    <button class="theme-toggle" aria-label="Toggle Dark Mode"><i data-lucide="moon"></i></button>
                </div>
                <div class="account-header">
                    <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                        <i data-lucide="gem" class="logo-icon"></i>
                        <a href="index.html">Silver</a>
                    </div>
                    <h1>Join Us</h1>
                    <p style="color: var(--text-secondary);">Create an account for personalized jewelry experiences.</p>
                </div>
                
                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-group" style="display: flex; align-items: flex-start; gap: 0.5rem; margin-top: -0.5rem;">
                        <input type="checkbox" id="terms" style="cursor: pointer; margin-top: 0.25rem;" required>
                        <label for="terms" style="margin-bottom: 0; cursor: pointer; font-size: 0.8125rem;">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>.</label>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
                    
                    <div class="form-footer">
                        Already have an account? <a href="login.html">Sign In</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
